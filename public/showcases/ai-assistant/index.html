<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lumina — AI 어시스턴트 데모</title>
  <meta name="description" content="ReactNext Central 쇼케이스 — AI 어시스턴트 인터페이스 (mock). standalone 데모." />
  <style>
    /* ===== 자기완결 테마 (사이트와 무관) ===== */
    :root {
      --bg: #0b0f1a;
      --panel: #121829;
      --panel-2: #1a2236;
      --line: #26304a;
      --tx: #e8ecf6;
      --tx-2: #9aa6c2;
      --tx-3: #5d6786;
      --acc: #7c5cff;
      --acc-2: #22d3ee;
      --grad: linear-gradient(120deg, #7c5cff, #22d3ee);
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: var(--sans); background: var(--bg); color: var(--tx); display: flex; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }
    a { color: inherit; }

    /* sidebar */
    .side { width: 260px; background: var(--panel); border-right: 1px solid var(--line); display: flex; flex-direction: column; flex-shrink: 0; }
    .brand { display: flex; align-items: center; gap: 10px; padding: 18px 18px 14px; font-weight: 800; letter-spacing: -.02em; font-size: 18px; }
    .logo { width: 30px; height: 30px; border-radius: 9px; background: var(--grad); display: grid; place-items: center; box-shadow: 0 4px 16px -4px #7c5cff88; }
    .logo svg { width: 17px; height: 17px; }
    .newchat { margin: 4px 14px 14px; padding: 11px 14px; border-radius: 11px; background: var(--panel-2); border: 1px solid var(--line); color: var(--tx); font-size: 13.5px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: .15s; }
    .newchat:hover { border-color: var(--acc); color: #fff; }
    .hist { flex: 1; overflow-y: auto; padding: 6px 10px; }
    .hist .lbl { font-size: 11px; font-weight: 700; color: var(--tx-3); padding: 10px 8px 6px; letter-spacing: .04em; text-transform: uppercase; }
    .hist a { display: block; padding: 9px 10px; border-radius: 8px; font-size: 13.5px; color: var(--tx-2); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hist a:hover, .hist a.on { background: var(--panel-2); color: var(--tx); }
    .side .foot { padding: 12px 16px; border-top: 1px solid var(--line); font-size: 12px; color: var(--tx-3); font-family: var(--mono); }

    /* main */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .top { display: flex; align-items: center; gap: 10px; padding: 14px 22px; border-bottom: 1px solid var(--line); }
    .model { display: flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 9px; background: var(--panel-2); border: 1px solid var(--line); font-size: 13px; font-weight: 600; cursor: pointer; }
    .model .dot { width: 7px; height: 7px; border-radius: 50%; background: #3fdc8a; box-shadow: 0 0 8px #3fdc8a; }
    .top .meter { margin-left: auto; font-family: var(--mono); font-size: 11.5px; color: var(--tx-3); }
    .top .meter b { color: var(--acc-2); }

    .chat { flex: 1; overflow-y: auto; padding: 28px 0; }
    .thread { max-width: 760px; margin: 0 auto; padding: 0 22px; display: flex; flex-direction: column; gap: 22px; }
    .row { display: flex; gap: 13px; }
    .row .ava { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; display: grid; place-items: center; font-size: 13px; font-weight: 800; }
    .row.me .ava { background: var(--panel-2); border: 1px solid var(--line); color: var(--tx-2); }
    .row.ai .ava { background: var(--grad); color: #fff; }
    .row .body { padding-top: 3px; font-size: 15px; line-height: 1.7; color: var(--tx); }
    .row.me .body { color: var(--tx-2); }
    .row .body .nm { font-weight: 700; font-size: 13px; margin-bottom: 4px; color: var(--tx-3); }
    .cursor { display: inline-block; width: 8px; height: 16px; background: var(--acc-2); margin-left: 2px; vertical-align: -3px; animation: blink 1s steps(2) infinite; border-radius: 1px; }
    @keyframes blink { 50% { opacity: 0; } }

    .sugg { max-width: 760px; margin: 18px auto 0; padding: 0 22px; display: flex; gap: 8px; flex-wrap: wrap; }
    .sugg button { padding: 9px 14px; border-radius: 20px; border: 1px solid var(--line); background: var(--panel); color: var(--tx-2); font-size: 13px; cursor: pointer; transition: .15s; }
    .sugg button:hover { border-color: var(--acc); color: #fff; background: var(--panel-2); }

    .composer { padding: 16px 22px 22px; }
    .inbox { max-width: 760px; margin: 0 auto; background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 8px 8px 8px 18px; display: flex; align-items: flex-end; gap: 10px; transition: .15s; }
    .inbox:focus-within { border-color: var(--acc); box-shadow: 0 0 0 4px #7c5cff22; }
    .inbox textarea { flex: 1; background: transparent; border: 0; resize: none; color: var(--tx); font-family: var(--sans); font-size: 15px; line-height: 1.5; outline: none; max-height: 140px; padding: 9px 0; }
    .send { width: 40px; height: 40px; border-radius: 11px; border: 0; background: var(--grad); color: #fff; cursor: pointer; display: grid; place-items: center; flex-shrink: 0; transition: .15s; }
    .send:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .send:disabled { opacity: .4; cursor: default; transform: none; }
    .hint { max-width: 760px; margin: 9px auto 0; text-align: center; font-size: 11.5px; color: var(--tx-3); font-family: var(--mono); }

    .back { position: fixed; top: 14px; right: 16px; z-index: 9; padding: 8px 13px; border-radius: 9px; background: #ffffff14; backdrop-filter: blur(8px); border: 1px solid var(--line); font-size: 12.5px; font-weight: 600; color: var(--tx-2); text-decoration: none; }
    .back:hover { color: #fff; }

    @media (max-width: 760px) {
      .side { display: none; }
      .top .meter { display: none; }
    }
  </style>
</head>
<body>
  <a class="back" href="/showcases">← 쇼케이스</a>
  <aside class="side">
    <div class="brand">
      <span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><path d="M12 3v18M3 12h18" /></svg></span>
      Lumina
    </div>
    <button class="newchat" id="newchat"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" /></svg> 새 대화</button>
    <div class="hist">
      <div class="lbl">오늘</div>
      <a class="on">Next.js 캐싱 전략 비교</a>
      <a>핀테크 온보딩 카피 다듬기</a>
      <a>RSC vs CSR 트레이드오프</a>
      <div class="lbl">이전</div>
      <a>Velite 마이그레이션 체크리스트</a>
      <a>디자인 토큰 네이밍 컨벤션</a>
    </div>
    <div class="foot">mock · 데이터 저장 안 됨</div>
  </aside>

  <main class="main">
    <div class="top">
      <div class="model"><span class="dot"></span> Lumina-4 · 판단 모드</div>
      <div class="meter">ctx <b id="ctx">2,481</b> / 128k tok</div>
    </div>
    <div class="chat" id="chat">
      <div class="thread" id="thread">
        <div class="row ai">
          <div class="ava">L</div>
          <div class="body"><div class="nm">Lumina</div>무엇을 만들고 계신가요? 아래 제안을 눌러보거나 직접 물어보세요. (이 데모는 정해진 mock 응답을 스트리밍처럼 보여줍니다.)</div>
        </div>
      </div>
    </div>
    <div class="sugg" id="sugg">
      <button data-q="Next.js에서 캐싱은 언제 끄는 게 좋아?">캐싱 언제 끄지?</button>
      <button data-q="RSC와 CSR 중 뭘 골라야 할까?">RSC vs CSR</button>
      <button data-q="이 데모 어떻게 만들었어?">이 데모 어떻게?</button>
    </div>
    <div class="composer">
      <div class="inbox">
        <textarea id="inp" rows="1" placeholder="Lumina에게 물어보기…"></textarea>
        <button class="send" id="send" aria-label="보내기"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" /></svg></button>
      </div>
      <div class="hint">Lumina는 실수할 수 있어요 · 이 화면은 ReactNext Central 쇼케이스 데모입니다</div>
    </div>
  </main>

  <script>
    var ANS = {
      "Next.js에서 캐싱은 언제 끄는 게 좋아?": "좋은 질문이에요. 캐싱을 끄는 건 보통 (1) 사용자별로 달라지는 데이터(인증·장바구니), (2) 실시간성이 중요한 대시보드, (3) 쓰기 직후 즉시 반영이 필요할 때예요. 반대로 마케팅 페이지·문서·블로그처럼 모두에게 같고 자주 안 바뀌는 건 적극적으로 캐싱하세요. 핵심은 \"이 데이터가 사용자마다 다른가, 얼마나 자주 바뀌나\" 두 축으로 판단하는 거예요.",
      "RSC와 CSR 중 뭘 골라야 할까?": "기본값은 RSC(서버 컴포넌트)로 두고, 상호작용이 필요한 지점만 클라이언트로 내리는 걸 추천해요. 데이터 페칭·SEO·번들 크기에서 RSC가 유리하고, 입력 폼·드래그·실시간 상태처럼 브라우저 이벤트가 핵심인 곳만 'use client'. 한 페이지 안에서 섞어 쓰는 게 정상이에요 — 전부 한쪽으로 몰 필요 없어요.",
      "이 데모 어떻게 만들었어?": "이 화면은 ReactNext Central의 쇼케이스 데모예요. 메인 사이트와 완전히 분리된 self-contained 정적 페이지(HTML·CSS·JS 한 파일)로, 사이트 디자인 토큰과 섞이지 않게 격리돼 있어요. 응답은 외부 호출 없이 정해진 mock이고요. ← 쇼케이스 링크로 갤러리에 돌아갈 수 있어요."
    };
    var FALLBACK = "이건 정해진 mock 응답만 있는 데모예요 🙂 위 제안 버튼을 눌러보시거나, 캐싱/RSC/이 데모에 대해 물어보세요.";

    var thread = document.getElementById('thread');
    var chat = document.getElementById('chat');
    var inp = document.getElementById('inp');
    var send = document.getElementById('send');
    var ctxEl = document.getElementById('ctx');
    var busy = false;

    function scroll() { chat.scrollTop = chat.scrollHeight; }
    function addRow(cls, name, text) {
      var row = document.createElement('div'); row.className = 'row ' + cls;
      row.innerHTML = '<div class="ava">' + (cls === 'ai' ? 'L' : '나') + '</div><div class="body">' + (name ? '<div class="nm">' + name + '</div>' : '') + '<span class="t"></span></div>';
      thread.appendChild(row); scroll();
      return row.querySelector('.t');
    }
    function bumpCtx(n) { var v = parseInt(ctxEl.textContent.replace(/,/g, '')) + n; ctxEl.textContent = v.toLocaleString(); }

    function stream(target, text, done) {
      var i = 0; var cur = document.createElement('span'); cur.className = 'cursor'; target.parentNode.appendChild(cur);
      var timer = setInterval(function () {
        target.textContent += text[i++];
        scroll();
        if (i >= text.length) { clearInterval(timer); cur.remove(); bumpCtx(text.length); done && done(); }
      }, 14);
    }

    function ask(q) {
      if (busy || !q.trim()) return; busy = true; send.disabled = true;
      addRow('me', null, q).textContent = q; bumpCtx(q.length);
      var t = addRow('ai', 'Lumina', '');
      setTimeout(function () { stream(t, ANS[q] || FALLBACK, function () { busy = false; send.disabled = false; inp.focus(); }); }, 420);
    }

    document.getElementById('sugg').addEventListener('click', function (e) { var b = e.target.closest('button'); if (b) ask(b.dataset.q); });
    document.getElementById('newchat').addEventListener('click', function () {
      thread.innerHTML = '<div class="row ai"><div class="ava">L</div><div class="body"><div class="nm">Lumina</div>새 대화를 시작했어요. 무엇을 도와드릴까요?</div></div>';
      ctxEl.textContent = '0';
    });
    function sendIt() { var v = inp.value; inp.value = ''; inp.style.height = 'auto'; ask(v); }
    send.addEventListener('click', sendIt);
    inp.addEventListener('input', function () { inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 140) + 'px'; });
    inp.addEventListener('keydown', function (e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendIt(); } });
  </script>
</body>
</html>
