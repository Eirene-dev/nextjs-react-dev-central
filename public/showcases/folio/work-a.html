<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>붉은 지평 — Folio</title>
<style>
  :root { --bg:#faf8f4; --ink:#1c1a17; --ink-2:#6a655c; --line:#e6e1d8; --accent:#b5462f;
    --serif:'Iowan Old Style',Georgia,serif; --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:var(--sans); background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; }
  a { color:inherit; }
  @view-transition { navigation: auto; }
  .hero { height:54vh; min-height:340px; position:relative; view-transition-name: art-a; }
  .hero > div { position:absolute; inset:0; background:linear-gradient(135deg,#b5462f,#f0a04b 70%,#7a2a1a); }
  .wrap { max-width:720px; margin:0 auto; padding:0 24px; }
  .back { display:inline-block; margin:24px 0 0; font-family:ui-monospace,monospace; font-size:13px; color:var(--accent); }
  article { padding:36px 0 90px; }
  .kicker { font-family:ui-monospace,monospace; font-size:12px; letter-spacing:.25em; text-transform:uppercase; color:var(--accent); }
  h1 { font-family:var(--serif); font-weight:400; font-size:clamp(34px,7vw,60px); line-height:1.05; letter-spacing:-.02em; margin:10px 0 18px; }
  p { color:#3a352e; font-size:17px; line-height:1.85; margin-bottom:18px; word-break:keep-all; }
  .meta { color:var(--ink-2); font-size:13px; }
</style>
</head>
<body>
  <div class="hero"><div></div></div>
  <div class="wrap">
    <a class="back" href="index.html">← 갤러리로</a>
    <article>
      <p class="kicker">Brand Identity · 2026</p>
      <h1>붉은 지평</h1>
      <p class="meta">목록의 카드 이미지가 이 히어로로 모핑되어 들어왔습니다 — 두 개의 정적 HTML 문서 사이에서, JS 한 줄 없이.</p>
      <p>지평선은 끝이 아니라 방향이다. 이 작업은 한 식품 브랜드의 리브랜딩으로, 해질녘의 붉은 색면을 단일 그래픽 언어로 정리했다. 로고는 색 하나와 각도 하나로 환원된다.</p>
      <p>핵심은 절제였다. 더 넣을수록 흐려지는 것들이 있다. 색을 줄이고, 여백을 늘리고, 단 하나의 형태만 반복했다.</p>
    </article>
  </div>
</body>
</html>
