      <h1>청록 호흡</h1>
      <p class="meta">전환이 지원되지 않는 브라우저에서는 그냥 이 페이지로 이동합니다 — 모핑만 생략될 뿐 모든 게 동일합니다.</p>
      <p>도심 수(水)공간의 환경 그래픽. 물의 청록을 벽면 전체로 확장해, 지나는 사람의 걸음에 따라 색이 호흡하듯 번지게 했다.</p>
      <p>크기가 곧 매체였다. 손바닥만 한 색 견본이 5미터 벽이 되었을 때 무엇이 남고 무엇이 사라지는지를, 실측 모형으로 반복해 확인했다.</p>
