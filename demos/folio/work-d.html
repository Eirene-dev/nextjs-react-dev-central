      <h1 class="t-d">보라 그늘</h1>
      <p class="meta">같은 <code>view-transition-name</code>(art-d)이 카드와 이 히어로에 함께 있어, 누른 색면이 그대로 이어집니다.</p>
      <p>실험 음악 페스티벌의 포스터 연작. 해가 진 뒤의 보랏빛 잔광을 한 장의 색면으로 붙잡았다. 글자는 그늘 속에서 천천히 드러난다.</p>
      <p>여섯 장이 모이면 하나의 밤이 된다. 각 포스터는 독립적이되, 같은 그라데이션 문법을 공유해 멀리서도 한 시리즈로 읽힌다.</p>
