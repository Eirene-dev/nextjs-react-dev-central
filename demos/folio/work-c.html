      <p class="meta">미지원 브라우저에서는 이 페이지로 그냥 이동합니다 — 전환만 없을 뿐 기능은 동일(graceful).</p>
      <p>친환경 차(茶) 브랜드의 패키지. 재생지의 결을 그대로 살리고, 잉크는 단색 녹색 하나로 제한했다. 덜 인쇄할수록 더 정직하다.</p>
      <p>형태는 손에 쥐는 경험에서 출발했다. 모서리의 둥글기, 뚜껑의 저항감까지가 디자인이었다.</p>
